<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者専用｜履歴書URL送信</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 2rem;
      color: #333;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    input[type="email"] {
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>管理者専用｜履歴書URL送信</h1>

    <form action="https://admin-send.takedadenno-fujizy.workers.dev/send" method="POST">
      <label for="email">送信先メールアドレス</label>
      <input type="email" id="email" name="email" required>

      <button type="submit">URL を送信する</button>
    </form>
  </div>
  <script>
    async function sendMail() {
    const email = document.getElementById("email").value;

    const res = await fetch("https://send-profurl.takedadenno-fujizy.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const result = await res.json();
    console.log(result);

    if (result.ok) {
      alert("送信しました。");
    } else {
      alert("送信に失敗しました。");
    }
  }
</script>

</body>
</html>
