<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>あゆみ（地図表示）</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 地図の初期化
        const map = L.map('map');

        // 表示領域（南西・北東）
        const bounds = [
            [30, 129], // 南西
            [42, 143]  // 北東
        ];

        // 表示領域に合わせる
        map.fitBounds(bounds);

        // 地理院地図（淡色地図）
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
            attribution: "<a href='https://maps.gsi.go.jp/'>地理院地図</a>"
        }).addTo(map);

        // GeoJSON の読み込み
        // fetch('gsi20260628235623568.geojson')
        fetch('gsi20260701144714915.geojson')
            .then(response => response.json())
            .then(data => {

                                                weight: p._weight ?? 2,

                                                fillColor: p._fillColor ?? "#3388ff",
                                                fillOpacity: p._fillOpacity ?? 0.2,
                                                radius: p._radius ?? 10
                                            });
                                        }
                
                                        // それ以外の Point は通常の Marker
                                        //return L.marker(latlng);

                                    },

                 */

                                        };
                                    }

                 */
                // まず LineString だけ描画
                L.geoJSON(data, {
                    filter: f => f.geometry.type === "LineString",
                    style: f => ({
                        color: f.properties._color ?? "#ff4444",
                        weight: f.properties._weight ?? 4,
                        opacity: f.properties._opacity ?? 1.0
                    })
                }).addTo(map);

                // 次に Point だけ描画
                L.geoJSON(data, {
                    filter: f => f.geometry.type === "Point",
                    pointToLayer: function (feature, latlng) {
                        const p = feature.properties;

                        if (p._markerType === "CircleMarker") {
                            return L.circleMarker(latlng, {
                                color: p._color ?? "#000000",
                                weight: p._weight ?? 2,
                                opacity: p._opacity ?? 1.0,
                                fillColor: p._fillColor ?? "#3388ff",
                                fillOpacity: p._fillOpacity ?? 0.2,
                                radius: p._radius ?? 10
                            });
                        }

                        if (p._markerType === "DivIcon" && p._html) {
                            const html = p._html.replace(
                                /<div[^>]*>/,
                                '<div style="writing-mode: horizontal-tb;">'
                            );
                            return L.marker(latlng, {
                                icon: L.divIcon({
                                    html: html,
                                    className: "",
                                }),
                                interactive: false
                            });
                        }

                        return null;
                    }
                }).addTo(map);
                // ★ GeoJSON 追加後にもう一度 fitBounds
                map.fitBounds(bounds);
            })
            .catch(err => console.error('GeoJSON 読み込みエラー:', err));
    </script>
