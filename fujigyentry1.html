<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>履歴書・職務経歴書｜申請フォーム</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 2rem;
      color: #333;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    input[type="email"] {
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    .h-captcha {
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>履歴書・職務経歴書｜申請フォーム</h1>
    <p>閲覧をご希望の方は、メールアドレスをご入力ください。</p>
    <p>ご入力いただいたメールアドレスを確認の上、</p>
    <p>折り返しご連絡いたします。</p>

    <form action="https://api.web3forms.com/submit" method="POST">
      <!-- Form Name : fujigy_prof -->
      <input type="hidden" name="access_key" value="9d270bc4-3bc4-4836-a6f6-b9b61295c71f">

      <!-- autoReply（Web3Forms 側で設定） -->
      <input type="hidden" name="redirect" value="https://fujigy.github.io/thanks.html">

      <input type="hidden" name="subject" value="【閲覧申請】履歴書・職務経歴書">
      <input type="hidden" name="from_name" value="閲覧申請フォーム">

      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required>

      <!-- Honeypot -->
      <input type="checkbox" name="botcheck" style="display:none;">
      
      <!-- hCaptcha -->
      <div class="h-captcha" data-captcha="true"></div>
      
      <button type="submit">送信する</button>
    </form>
  </div>
</body>
</html>
