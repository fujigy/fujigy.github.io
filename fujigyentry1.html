<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>履歴書・職務経歴書｜アクセス確認</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 2rem;
      color: #333;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    input[type="email"] {
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>履歴書・職務経歴書｜アクセス確認</h1>
    <p>閲覧にはメールアドレスの確認が必要です。</p>

    <form action="https://my-worker.takedadenno-fujizy.workers.dev" method="POST">
      <input type="hidden" name="target" value="career">
      <label for="email-career">メールアドレス</label>
      <input type="email" id="email-career" name="email" required>
      <button type="submit">閲覧する</button>
    </form>
  </div>
</body>
</html>
