<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>これまでのあゆみ｜アクセス確認</title>
        <script
            src="https://cdn.jsdelivr.net/npm/altcha@latest/dist/altcha.umd.js"
            defer
        ></script>
    </head>
    <body>
        <p>
            <a
                href="https://fujigy.github.io/"
                style="color: #0066cc; text-decoration: none"
            >
                ← 先頭へ戻る
            </a>
        </p>

        <div class="container">
            <h1>これまでのあゆみ｜アクセス確認</h1>
            <p>
                閲覧をご希望の方は、メールアドレスをご入力の上、申請するボタンをクリックしてください。
            </p>

            <form id="entryForm" action="#" method="POST">
                <input type="hidden" name="target" value="ayumi" />

                <label for="email-ayumi">メールアドレス</label>
                <input type="email" id="email-ayumi" name="email" required />

                <!-- ▼ ALTCHA -->
                <altcha-widget id="altcha"></altcha-widget>

                <button id="submitBtn" type="submit" disabled>申請する</button>
            </form>

            <div id="error" style="color: red; margin-top: 1rem"></div>
        </div>

        <script>
            const form = document.getElementById("entryForm");
            const submitBtn = document.getElementById("submitBtn");
            const emailInput = document.getElementById("email-ayumi");
            const errorDiv = document.getElementById("error");
            const altcha = document.getElementById("altcha");

            function isValidEmail(email) {
                return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email);
            }

            function updateButtonState() {
                const email = emailInput.value.trim();
                const token = altcha.getAttribute("data-token");
                submitBtn.disabled = !(isValidEmail(email) && token);
            }

            emailInput.addEventListener("input", updateButtonState);
            altcha.addEventListener("altcha-success", updateButtonState);

            form.addEventListener("submit", async function (e) {
                e.preventDefault();

                const email = emailInput.value.trim();
                const token = altcha.getAttribute("data-token");

                if (!isValidEmail(email)) {
                    errorDiv.textContent =
                        "メールアドレスの形式が正しくありません。";
                    return;
                }

                if (!token) {
                    errorDiv.textContent = "認証が確認できませんでした。";
                    return;
                }

                try {
                    const res = await fetch(
                        "https://admin-send.takedadenno-fujizy.workers.dev/send",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                email,
                                altcha: token,
                            }),
                        },
                    );

                    const data = await res.json();

                    if (data.error) {
                        errorDiv.textContent = "認証に失敗しました。";
                        return;
                    }

                    if (data.redirect) {
                        window.location.href = data.redirect;
                    }
                } catch (err) {
                    errorDiv.textContent = "通信エラーが発生しました。";
                }
            });
        </script>
    </body>
</html>
