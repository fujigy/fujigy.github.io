<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>これまでのあゆみ｜アクセス確認</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 2rem;
      color: #333;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    input[type="email"] {
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>これまでのあゆみ｜アクセス確認</h1>
    <p>閲覧をご希望の方は、メールアドレスをご入力の上、申請するボタンをクリックしてください。</p>

    <form id="entryForm">
      <input type="hidden" name="target" value="ayumi">
      <label for="email-ayumi">メールアドレス</label>
      <input type="email" id="email-ayumi" name="email" required>
      <button type="submit">申請する</button>
    </form>

    <div id="error" style="color: red; margin-top: 1rem;"></div>
  </div>

  <script>
    document.getElementById("entryForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email-ayumi").value.trim();
      const errorDiv = document.getElementById("error");

      try {
        const res = await fetch("https://admin-send.takedadenno-fujizy.workers.dev/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.error) {
          errorDiv.textContent = "メールアドレスが確認できませんでした。";
          return;
        }

        if (data.redirect) {
          window.location.href = data.redirect;
        }

      } catch (err) {
        errorDiv.textContent = "通信エラーが発生しました。";
      }
    });
  </script>
</body>
</html>
