<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>これまでのあゆみ｜アクセス確認</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 2rem;
      color: #333;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 1.5rem;
    }
    .section {
      margin-bottom: 2rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    input[type="email"] {
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>アクセス確認</h1>
    <p>閲覧にはメールアドレスの確認が必要です。<br>
       閲覧したい項目を選び、メールアドレスを入力してください。</p>

    <!-- 履歴書 -->
    <div class="section">
      <h2>履歴書</h2>
      <form action="https://my-worker.takedadenno-fujizy.workers.dev" method="POST">
        <input type="hidden" name="target" value="resume">
        <label for="email-resume">メールアドレス</label>
        <input type="email" id="email-resume" name="email" required>
        <button type="submit">閲覧する</button>
      </form>
    </div>

    <!-- 職務経歴書 -->
    <div class="section">
      <h2>職務経歴書</h2>
      <form action="https://my-worker.takedadenno-fujizy.workers.dev" method="POST">
        <input type="hidden" name="target" value="work">
        <label for="email-career">メールアドレス</label>
        <input type="email" id="email-career" name="email" required>
        <button type="submit">閲覧する</button>
      </form>
    </div>

    <!-- これまでのあゆみ（修行編） -->
    <div class="section">
      <h2>これまでのあゆみ（修行編）</h2>
      <form action="https://my-worker.takedadenno-fujizy.workers.dev" method="POST">
        <input type="hidden" name="target" value="beginner">
        <label for="email-training">メールアドレス</label>
        <input type="email" id="email-training" name="email" required>
        <button type="submit">閲覧する</button>
      </form>
    </div>

    <!-- これまでのあゆみ（実務編） -->
    <div class="section">
      <h2>これまでのあゆみ（実務編）</h2>
      <form action="https://my-worker.takedadenno-fujizy.workers.dev" method="POST">
        <input type="hidden" name="target" value="expert">
        <label for="email-work">メールアドレス</label>
        <input type="email" id="email-work" name="email" required>
        <button type="submit">閲覧する</button>
      </form>
    </div>

  </div>
</body>
</html>
