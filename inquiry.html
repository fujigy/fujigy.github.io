<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>お問い合わせ</title>
</head>
<body>
  <p>
    <a
      href="https://fujigy.github.io/"
      style="color: #0066cc; text-decoration: none"
      >
      ← 先頭へ戻る
    </a>
  </p>
  <div class="container">
    <h1>お問い合わせ</h1>
    <p>以下のフォームからご連絡ください。</p>

    <form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="redirect" value="https://fujigy.github.io/thanks.html">
      <input type="hidden" name="access_key" value="a24f6264-e3f7-4ee8-b096-2d969d5d4d4a">

      <input type="hidden" name="subject" value="【問い合わせ】from html">
      <input type="hidden" name="from_name" value="fujigy.github.io">

      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required>

      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required>

      <label for="message">お問い合わせ内容</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <div class="h-captcha" data-captcha="true"></div>

      <button type="submit">送信する</button>

      <script src="https://web3forms.com/client/script.js" async defer></script>
    </form>

  </div>

</body>
</html>
