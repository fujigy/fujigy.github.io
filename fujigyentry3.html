<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>お問い合わせ</title>
    </head>
    <body>
        <p>
            <a
                href="https://fujigy.github.io/"
                style="color: #0066cc; text-decoration: none"
            >
                ← 先頭へ戻る
            </a>
        </p>
        <div class="container">
            <h1>お問い合わせ</h1>
            <p>ご質問・ご連絡はこちらからお送りください。</p>

            <form action="https://api.web3forms.com/submit" method="POST">
                <!-- Form Name : fujigy_prof -->
                <input
                    type="hidden"
                    name="access_key"
                    value="9d270bc4-3bc4-4836-a6f6-b9b61295c71f"
                />

                <!-- autoReply（Web3Forms 側で設定） -->
                <input
                    type="hidden"
                    name="redirect"
                    value="https://fujigy.github.io/thanks.html"
                />

                <!-- autoReply（Web3Forms 側で設定） -->
                <input
                    type="hidden"
                    name="subject"
                    value="【要確認】問い合わせ入力あり"
                />
                <input type="hidden" name="from_name" value="問合フォーム" />

                <!-- Honeypot（最低限） -->
                <input type="text" name="hp_field" class="hidden" />

                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="email" required />

                <label for="message">お問い合わせ内容</label>
                <textarea
                    id="message"
                    name="message"
                    rows="5"
                    required
                ></textarea>

                <button type="submit">送信</button>
            </form>
        </div>
    </body>
</html>
