<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>履歴書・職務経歴書｜閲覧申請</title>

        <!-- ALTCHA -->
        <script
            src="https://cdn.jsdelivr.net/npm/altcha@latest/dist/altcha.umd.js"
            defer
        ></script>
    </head>

    <body>
        <p>
            <a
                href="https://fujigy.github.io/"
                style="color: #0066cc; text-decoration: none"
            >
                ← 先頭へ戻る
            </a>
        </p>

        <div class="container">
            <h1>履歴書・職務経歴書 閲覧申請</h1>
            <p>
                こちらから、履歴書・職務経歴書の閲覧ページへアクセスできます。
            </p>
            <p>
                メールアドレスを入力し、「私は人間です」にチェックをすると、
                セキュリティチェックのための簡単なクイズを解いてください。
                正解したら［申請する］をクリックします。
                すると各書類の閲覧ページに移動します。
            </p>
            <p>
                ご覧になる書類のリンクをクリックすると、ブラウザ上で閲覧できます。
            </p>
            <p>なお各ページには［PDFダウンロード］ボタンを準備しております。</p>
            <p>必要な方はご利用ください。</p>

            <form action="https://api.web3forms.com/submit" method="POST">
                <!-- Form Name : fujigy_prof -->
                <input
                    type="hidden"
                    name="access_key"
                    value="9d270bc4-3bc4-4836-a6f6-b9b61295c71f"
                />

                <!-- autoReply（Web3Forms 側で設定） -->
                <input
                    type="hidden"
                    name="redirect"
                    value="https://fujigy.github.io/prof-hub.html"
                />
                <input
                    type="hidden"
                    name="error_redirect"
                    value="https://fujigy.github.io/prof-error.html"
                />
                <input
                    type="hidden"
                    name="subject"
                    value="【閲覧申請】履歴書・職務経歴書"
                />
                <input
                    type="hidden"
                    name="from_name"
                    value="fujigy.github.io"
                />

                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="email" required />

                <!-- Honeypot -->
                <input type="checkbox" name="botcheck" style="display: none" />

                <!-- ALTCHA -->
                <altcha-widget
                    challengeurl="https://altcha.org/api/v1/challenge"
                    style="margin-bottom: 1rem"
                ></altcha-widget>

                <button type="submit">申請する</button>

                <!-- Web3Forms script（残す） -->
                <script
                    src="https://web3forms.com/client/script.js"
                    async
                    defer
                ></script>
            </form>
        </div>
    </body>
</html>
